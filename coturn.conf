# Listening port
listening-port=3478

# WebRTC requirements
fingerprint
lt-cred-mech

# Realm (should match what the app generates credentials for)
realm=auris.xyz

# Secret-based authentication mechanism
use-auth-secret
static-auth-secret=auris-turn-secret-key-for-local-development-9912

# Port range for allocations
min-port=49152
max-port=65535

# Logging
log-file=stdout

# Security adjustments
no-multicast-peers
stale-nonce=600
