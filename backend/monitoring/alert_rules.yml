# Auris - Alert Rules for Prometheus
# Critical alerting conditions for production monitoring

groups:
  # ── API Performance Alerts ───────────────────────────────────────────────
  - name: api_performance
    interval: 1m
    rules:
      # High latency alert
      - alert: HighAPILatency
        expr: histogram_quantile(0.99, http_request_duration_seconds_bucket) > 1
        for: 5m
        labels:
          severity: warning
          service: auris-api
        annotations:
          summary: "High API latency detected"
          description: "P99 latency is {{ $value }}s, exceeds threshold of 1s"

      # Very high latency alert
      - alert: CriticalAPILatency
        expr: histogram_quantile(0.99, http_request_duration_seconds_bucket) > 5
        for: 2m
        labels:
          severity: critical
          service: auris-api
        annotations:
          summary: "Critical API latency detected"
          description: "P99 latency is {{ $value }}s, CRITICAL"

  # ── Error Rate Alerts ────────────────────────────────────────────────────
  - name: error_rates
    interval: 1m
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: |
          (sum(rate(http_error_total[5m])) / sum(rate(http_requests_total[5m]))) > 0.05
        for: 5m
        labels:
          severity: warning
          service: auris-api
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }}, threshold is 5%"

      # Critical error rate
      - alert: CriticalErrorRate
        expr: |
          (sum(rate(http_error_total[5m])) / sum(rate(http_requests_total[5m]))) > 0.1
        for: 2m
        labels:
          severity: critical
          service: auris-api
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }}, CRITICAL"

  # ── Database Alerts ─────────────────────────────────────────────────────
  - name: database
    interval: 1m
    rules:
      # High query latency
      - alert: HighDatabaseLatency
        expr: histogram_quantile(0.95, database_query_duration_seconds_bucket) > 1
        for: 5m
        labels:
          severity: warning
          service: auris-db
        annotations:
          summary: "High database query latency"
          description: "P95 query latency is {{ $value }}s"

      # Connection pool exhaustion
      - alert: ConnectionPoolExhaustion
        expr: db_connection_pool_checked_in < 2
        for: 3m
        labels:
          severity: critical
          service: auris-db
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "Only {{ $value }} connections available"

      # Connection pool high utilization
      - alert: HighConnectionPoolUtilization
        expr: (1 - (db_connection_pool_checked_in / db_connection_pool_size)) > 0.8
        for: 5m
        labels:
          severity: warning
          service: auris-db
        annotations:
          summary: "High database connection pool utilization"
          description: "{{ $value | humanizePercentage }} of connections in use"

  # ── Circuit Breaker Alerts ──────────────────────────────────────────────
  - name: circuit_breakers
    interval: 1m
    rules:
      # Circuit breaker opened
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: warning
          service: auris-api
        annotations:
          summary: "Circuit breaker opened"
          description: "{{ $labels.service }} circuit breaker is OPEN"

      # Circuit breaker half-open
      - alert: CircuitBreakerHalfOpen
        expr: circuit_breaker_state{state="half_open"} == 1
        for: 2m
        labels:
          severity: warning
          service: auris-api
        annotations:
          summary: "Circuit breaker in recovery"
          description: "{{ $labels.service }} circuit breaker is HALF-OPEN (attempting recovery)"

  # ── Call-Specific Alerts ────────────────────────────────────────────────
  - name: calls
    interval: 1m
    rules:
      # High call failure rate
      - alert: HighCallFailureRate
        expr: |
          (sum(rate(auris_call_failed_total[5m])) / 
           (sum(rate(auris_call_created_total[5m])) + 
            sum(rate(auris_call_failed_total[5m])))) > 0.1
        for: 5m
        labels:
          severity: warning
          service: auris-calls
        annotations:
          summary: "High call failure rate"
          description: "{{ $value | humanizePercentage }} of calls are failing"

      # No calls in progress (possible issue)
      - alert: NoActiveCalls
        expr: auris_active_calls == 0
        for: 30m
        labels:
          severity: info
          service: auris-calls
        annotations:
          summary: "No active calls detected"
          description: "No calls have been active for 30 minutes (may be normal)"

  # ── Campaign Alerts ─────────────────────────────────────────────────────
  - name: campaigns
    interval: 1m
    rules:
      # High campaign failure rate
      - alert: HighCampaignFailureRate
        expr: |
          (sum(rate(auris_campaign_contact_failed_total[5m])) /
           sum(rate(auris_campaign_contact_processed_total[5m]))) > 0.2
        for: 5m
        labels:
          severity: warning
          service: auris-campaigns
        annotations:
          summary: "High campaign contact failure rate"
          description: "{{ $value | humanizePercentage }} of campaign contacts failing"

  # ── System Health Alerts ────────────────────────────────────────────────
  - name: system_health
    interval: 1m
    rules:
      # High memory usage
      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 536870912) > 0.8  # 80% of 512MB
        for: 5m
        labels:
          severity: warning
          service: auris-api
        annotations:
          summary: "High memory usage detected"
          description: "API using {{ $value | humanizePercentage }} of available memory"

      # High CPU usage
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          service: auris-api
        annotations:
          summary: "High CPU usage detected"
          description: "API CPU usage is {{ $value | humanizePercentage }}"

      # Service down
      - alert: AurisAPIDown
        expr: up{job="auris-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: auris-api
        annotations:
          summary: "Auris API is DOWN"
          description: "Auris API at {{ $labels.instance }} is not responding"

  # ── SLA Alerts ──────────────────────────────────────────────────────────
  - name: sla
    interval: 5m
    rules:
      # 99.9% uptime SLA (allowing 0.1% downtime)
      - alert: SLAViolation
        expr: |
          (sum(rate(http_requests_total{status=~"2.."}[1h])) /
           sum(rate(http_requests_total[1h]))) < 0.999
        for: 5m
        labels:
          severity: critical
          service: auris-api
        annotations:
          summary: "SLA violation - uptime below 99.9%"
          description: "Uptime is {{ $value | humanizePercentage }}, SLA requires 99.9%"

  # ── Rate Limiting Alerts ────────────────────────────────────────────────
  - name: rate_limiting
    interval: 1m
    rules:
      # High rate limit hit rate
      - alert: HighRateLimitExceeded
        expr: sum(rate(http_429_total[5m])) > 10
        for: 5m
        labels:
          severity: warning
          service: auris-api
        annotations:
          summary: "High rate of rate limiting"
          description: "{{ $value }} rate limit exceeds per 5 seconds"
